[build]
  command   = "npm install --legacy-peer-deps && npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"

# SPA fallback — catches all unmatched routes, sends to React app
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# index.html — never cache so iOS always gets fresh routing
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"

# JS/CSS assets — cache forever (Vite adds hash to filename on change)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
